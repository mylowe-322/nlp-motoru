<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akıllı Not & Araştırma Motoru</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #0f172a; color: #f8fafc;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box;
        }
        .container {
            width: 100%; max-width: 600px; background: #1e293b; padding: 30px;
            border-radius: 16px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.3);
            border: 2px solid #334155; transition: all 0.4s ease;
        }
        h2 { margin-top: 0; text-align: center; color: #38bdf8; }
        textarea {
            width: 100%; height: 130px; background: #0f172a; border: 1px solid #475569;
            border-radius: 8px; color: #f8fafc; padding: 12px; font-size: 16px;
            resize: none; box-sizing: border-box; outline: none; transition: border-color 0.3s;
        }
        textarea:focus { border-color: #38bdf8; }
        .result-box {
            margin-top: 15px; padding: 15px; border-radius: 8px; background: #0f172a;
            text-align: center; font-size: 18px; font-weight: bold;
            transition: all 0.3s ease;
        }
        .sub-category {
            display: block; font-size: 14px; font-weight: normal; margin-top: 5px; opacity: 0.8;
        }
        .evidence-box, .wiki-box {
            margin-top: 15px; font-size: 14px; background: #0f172a;
            padding: 12px; border-radius: 8px; border: 1px solid #334155;
        }
        .wiki-box { border-color: #0ea5e9; display: none; }
        .wiki-title { color: #38bdf8; font-weight: bold; margin-bottom: 5px; font-size: 15px;}
        .tag {
            background: #334155; color: #e2e8f0; padding: 3px 8px;
            border-radius: 4px; margin-right: 5px; display: inline-block; font-size: 12px; margin-top: 4px;
        }
    </style>
</head>
<body>

<div class="container" id="appCard">
    <h2>Akıllı Not Motoru</h2>
    <p style="color: #94a3b8; text-align: center; font-size: 14px; margin-bottom: 20px;">Kategorize eder ve Wikipedia'dan anında bilgi çeker.</p>
    
    <textarea id="noteInput" placeholder="Notunuzu yazın... (Örn: Joan Oates'in Babil kitabı veya Sümer tabletleri üzerine notlar)"></textarea>
    
    <div class="result-box" id="resultBadge">
        <span>🤖</span> Ana Kategori: Bekleniyor
        <span class="sub-category" id="subCategoryText">-</span>
    </div>

    <div class="wiki-box" id="wikiBox">
        <div class="wiki-title">🔍 Wikipedia Araştırması: <span id="wikiKeyword">...</span></div>
        <div id="wikiContent" style="color: #cbd5e1; line-height: 1.5;">Aranıyor...</div>
    </div>

    <div class="evidence-box">
        <strong style="color: #94a3b8;">Yakalanan Kanıtlar:</strong>
        <div id="evidenceList" style="margin-top: 5px;">-</div>
    </div>
</div>

<script>
// ZENGİNLEŞTİRİLMİŞ MOTOR (Alt Kategoriler Eklendi)
const THEMES = {
  tarih: { 
    emoji:"📜", bg:"#1c140c", border:"#f59e0b", accent:"#fbbf24", label:"Tarih",
    keywords:["tarih", "antik", "imparatorluk", "arkeoloji", "kral", "sümer", "babil", "osmanlı", "devrim", "savaş"],
    actors:["hammurabi", "herodot", "sargon"],
    subs: { "Antik Çağ": ["sümer", "babil", "antik"], "Yakın Tarih": ["osmanlı", "devrim"] }
  },
  felsefe: { 
    emoji:"🏛️", bg:"#141526", border:"#6366f1", accent:"#818cf8", label:"Felsefe",
    keywords:["felsefe", "etik", "varoluş", "mantık", "düşünce", "hakikat", "metafizik", "ontoloji", "bilgi", "akıl"],
    actors:["sokrates", "platon", "aristoteles", "nietzsche"],
    subs: { "Antik Yunan": ["sokrates", "platon"], "Modern Felsefe": ["nietzsche", "varoluş"] }
  },
  sosyoloji: { 
    emoji:"👥", bg:"#1a0f16", border:"#ec4899", accent:"#f472b6", label:"Sosyoloji",
    keywords:["toplum", "sınıf", "kültür", "nüfus", "etkileşim", "yapı", "modernleşme", "kentleşme", "grup"],
    actors:["durkheim", "weber", "marx"],
    subs: { "Toplumsal Yapı": ["sınıf", "yapı"], "Kültür": ["kültür", "etkileşim"] }
  },
  psikoloji: { 
    emoji:"🧠", bg:"#0b1a17", border:"#14b8a6", accent:"#2dd4bf", label:"Psikoloji",
    keywords:["zihin", "davranış", "bilinç", "duygu", "terapi", "algı", "gelişim", "kişilik", "bilişsel"],
    actors:["freud", "jung", "pavlov"],
    subs: { "Klinik": ["terapi", "kişilik"], "Bilişsel": ["zihin", "algı"] }
  },
  siyaset: { 
    emoji:"⚖️", bg:"#1a0c0c", border:"#ef4444", accent:"#f87171", label:"Siyaset",
    keywords:["devlet", "hükümet", "politika", "yasa", "seçim", "diplomasi", "iktidar", "demokrasi", "ideoloji"],
    actors:["machiavelli", "hobbes"],
    subs: { "Uluslararası": ["diplomasi"], "İç Politika": ["seçim", "hükümet"] }
  },
  ekonomi: { 
    emoji:"💹", bg:"#0a140d", border:"#10b981", accent:"#34d399", label:"Ekonomi",
    keywords:["para", "piyasa", "finans", "borsa", "enflasyon", "üretim", "tüketim", "yatırım", "faiz"],
    actors:["smith", "keynes"],
    subs: { "Makro": ["enflasyon", "faiz"], "Finans": ["borsa", "para"] }
  },
  teknoloji: { 
    emoji:"💻", bg:"#0a1219", border:"#0ea5e9", accent:"#38bdf8", label:"Teknoloji",
    keywords:["yazılım", "kod", "algoritma", "yapay zeka", "robot", "veri", "dijital", "donanım", "bulut"],
    actors:["turing", "jobs"],
    subs: { "Yazılım": ["kod", "algoritma"], "AI": ["yapay zeka", "veri"] }
  },
  edebiyat: { 
    emoji:"✍️", bg:"#150e1a", border:"#a855f7", accent:"#c084fc", label:"Edebiyat",
    keywords:["şiir", "roman", "yazar", "şair", "metin", "kurgu", "dil", "eleştiri", "roman"],
    actors:["kafka", "dostoyevski"],
    subs: { "Roman": ["roman", "kurgu"], "Şiir": ["şiir", "şair"] }
  },
  hukuk: { 
    emoji:"📜", bg:"#14100c", border:"#f97316", accent:"#fb923c", label:"Hukuk",
    keywords:["adalet", "mahkeme", "suç", "ceza", "avukat", "hak", "anayasa", "yargı", "mevzuat"],
    actors:["kelsen", "montesquieu"],
    subs: { "Ceza": ["suç", "ceza"], "Anayasa": ["anayasa", "hak"] }
  },
  tip: { 
    emoji:"⚕️", bg:"#1a0b12", border:"#e11d48", accent:"#fb7185", label:"Tıp & Sağlık",
    keywords:["sağlık", "hastalık", "tedavi", "anatomi", "doktor", "biyoloji", "ilaç", "klinik", "cerrahi"],
    actors:["hipokrat", "avicenna"],
    subs: { "Klinik": ["tedavi", "klinik"], "Biyoloji": ["anatomi", "biyoloji"] }
  }
};

function analyzeText(text) {
  let scores = { tarih:0, felsefe:0, sosyoloji:0, psikoloji:0, siyaset:0, ekonomi:0, teknoloji:0, edebiyat:0, hukuk:0, tip:0 }; 
  let evidence = [];
  let lowerText = text.toLowerCase();
  
  if (lowerText.length < 3) return { winner: "genel", sub: "-", evidence: [] };

  Object.keys(THEMES).forEach(cat => {
    THEMES[cat].actors.forEach(act => { if(lowerText.includes(act)) { scores[cat] += 20; evidence.push(act); } });
    THEMES[cat].keywords.forEach(key => { if(lowerText.includes(key)) { scores[cat] += 5; if(!evidence.includes(key)) evidence.push(key); } });
  });

  let maxScore = 0; let winner = "genel"; let subCategory = "Belirlenemedi";
  Object.keys(scores).forEach(c => { if(scores[c] > maxScore) { maxScore = scores[c]; winner = c; } });

  // Alt Kategori Tespiti
  if (winner !== "genel") {
      let subScores = {};
      Object.keys(THEMES[winner].subs).forEach(sub => {
          subScores[sub] = 0;
          THEMES[winner].subs[sub].forEach(word => { if(lowerText.includes(word)) subScores[sub] += 1; });
      });
      let maxSubScore = 0;
      Object.keys(subScores).forEach(sub => { if(subScores[sub] > maxSubScore) { maxSubScore = subScores[sub]; subCategory = sub; } });
  }

  return { winner: winner, sub: subCategory, evidence: evidence.slice(0, 4) };
}

// WIKIPEDIA API BAĞLANTISI
async function fetchWikipedia(keyword) {
    const wikiBox = document.getElementById('wikiBox');
    const wikiContent = document.getElementById('wikiContent');
    const wikiKeyword = document.getElementById('wikiKeyword');
    
    if(!keyword) { wikiBox.style.display = 'none'; return; }
    
    wikiBox.style.display = 'block';
    wikiKeyword.innerText = keyword.toUpperCase();
    wikiContent.innerText = "Bilgi getiriliyor...";

    try {
        const response = await fetch(`https://tr.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(keyword)}`);
        if (response.ok) {
            const data = await response.json();
            if(data.extract) {
                wikiContent.innerText = data.extract.substring(0, 200) + "...";
            } else {
                wikiContent.innerText = "Bu konuyla ilgili kısa bir özet bulunamadı.";
            }
        } else {
            wikiContent.innerText = "Wikipedia'da bu başlık tam olarak bulunamadı.";
        }
    } catch (error) {
        wikiContent.innerText = "Bağlantı hatası oluştu.";
    }
}

// ARAYÜZ KONTROLLERİ VE ZAMANLAYICI (Debounce)
const noteInput = document.getElementById('noteInput');
const appCard = document.getElementById('appCard');
const resultBadge = document.getElementById('resultBadge');
const subCategoryText = document.getElementById('subCategoryText');
const evidenceList = document.getElementById('evidenceList');

let typingTimer;

noteInput.addEventListener('input', () => {
    clearTimeout(typingTimer); // Kullanıcı yazarken sayacı sıfırla
    
    const analysis = analyzeText(noteInput.value);
    
    // Tema Renklendirmesi
    if (analysis.winner !== 'genel' && THEMES[analysis.winner]) {
        const t = THEMES[analysis.winner];
        appCard.style.borderColor = t.border;
        resultBadge.style.backgroundColor = t.bg;
        resultBadge.style.color = t.accent;
        resultBadge.innerHTML = `<span>${t.emoji}</span> Kategori: ${t.label} <span class="sub-category" id="subCategoryText">Alt Kategori: ${analysis.sub}</span>`;
    } else {
        appCard.style.borderColor = '#334155';
        resultBadge.style.backgroundColor = '#0f172a';
        resultBadge.style.color = '#f8fafc';
        resultBadge.innerHTML = `<span>🤖</span> Ana Kategori: Bekleniyor <span class="sub-category" id="subCategoryText">-</span>`;
    }
    
    // Kanıtları Yazdır
    evidenceList.innerHTML = analysis.evidence.length > 0 ? analysis.evidence.map(w => `<span class="tag">${w}</span>`).join('') : '-';

    // Kullanıcı yazmayı bıraktıktan 1 saniye sonra Wikipedia'da ilk bulduğu kanıtı arasın
    typingTimer = setTimeout(() => {
        if(analysis.evidence.length > 0) {
            // İlk kanıt kelimesini Wikipedia'da aratıyoruz
            fetchWikipedia(analysis.evidence[0]);
        } else {
            document.getElementById('wikiBox').style.display = 'none';
        }
    }, 1000); 
});
</script>
</body>
</html>
