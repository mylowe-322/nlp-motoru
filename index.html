<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Not Kategorize Motoru</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            width: 100%;
            max-width: 600px;
            background: #1e293b;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            transition: all 0.4s ease;
            border: 2px solid #334155;
        }
        h2 { margin-top: 0; text-align: center; color: #38bdf8; }
        textarea {
            width: 100%; height: 150px; background: #0f172a; border: 1px solid #475569;
            border-radius: 8px; color: #f8fafc; padding: 12px; font-size: 16px;
            resize: none; box-sizing: border-box; outline: none; transition: border-color 0.3s;
        }
        textarea:focus { border-color: #38bdf8; }
        .result-box {
            margin-top: 20px; padding: 15px; border-radius: 8px; background: #0f172a;
            text-align: center; font-size: 18px; font-weight: bold; display: flex;
            align-items: center; justify-content: center; gap: 10px; transition: all 0.3s ease;
        }
        .evidence-box {
            margin-top: 15px; font-size: 14px; color: #94a3b8; background: #0f172a;
            padding: 10px; border-radius: 8px; min-height: 40px;
        }
        .tag {
            background: #334155; color: #e2e8f0; padding: 2px 8px;
            border-radius: 4px; margin-right: 5px; display: inline-block; font-size: 12px;
        }
    </style>
</head>
<body>

<div class="container" id="appCard">
    <h2>Not Kategorize Etici</h2>
    <p style="color: #94a3b8; text-align: center; font-size: 14px;">Metni yazdıkça kategori otomatik analiz edilir.</p>
    <textarea id="noteInput" placeholder="Buraya yazmaya başla... (Örn: Sümer tabletleri veya felsefe)"></textarea>
    <div class="result-box" id="resultBadge"><span>🤖</span> Ana Kategori: Genel / Bekleniyor</div>
    <div class="evidence-box">
        <strong>Yakalanan Kanıt Kelimeler:</strong>
        <div id="evidenceList" style="margin-top: 5px;">-</div>
    </div>
</div>

<script>
// MOTOR VE KELİME LİSTESİ BURADA BİRLEŞTİ
const THEMES = {
  tarih: { emoji:"📜", bg:"#1c140c", border:"#f59e0b", accent:"#fbbf24", label:"Tarih & Kronoloji",
    keywords:["sümer","babil","akad","tablet","kil","uygarlık","antik","medeniyet","imparatorluk","arkeoloji","kral","roma","bizans","osmanlı","tarih","tarihi","mitoloji"],
    phrases:["kil tablet","antik mısır","antik yunan","bizans imparatorluğu"], actors:["hammurabi","herodot","sezar"] },
  felsefe: { emoji:"🏛️", bg:"#141526", border:"#6366f1", accent:"#818cf8", label:"Felsefe & Düşünce",
    keywords:["felsefe","düşünce","etik","ahlak","varoluş","nihilizm","stoa","akıl","bilgi","erdem","özgürlük","şüphe","kuşku","filozof","sorgulama","hakikat","gerçeklik","zihin","ruh","mantık","anlam","anlamsız","anlamsızlık","neden","niçin","soru","cevap"],
    phrases:["ahlak felsefesi","bilgi kuramı","özgür irade","stoacı felsefe","yaşamın anlamı"], actors:["sokrates","platon","aristoteles","nietzsche","camus","seneca"] }
};

function analyzeNoteText(text) {
  var scores = { tarih:0, felsefe:0 }; var evidence = [];
  if (!text || text.trim().length < 3) return { winner:"genel", evidence:[] };
  var lowerText = text.toLowerCase();
  
  Object.keys(THEMES).forEach(cat => {
    THEMES[cat].actors.forEach(act => { if(lowerText.indexOf(act) !== -1) { scores[cat] += 25; evidence.push(act); } });
    THEMES[cat].phrases.forEach(phr => { if(lowerText.indexOf(phr) !== -1) { scores[cat] += 15; evidence.push(phr); } });
    THEMES[cat].keywords.forEach(key => { if(lowerText.indexOf(key) !== -1) { scores[cat] += 3; if(evidence.indexOf(key)===-1) evidence.push(key); } });
  });

  var maxScore = 0; var winner = "genel";
  Object.keys(scores).forEach(c => { if(scores[c] > maxScore) { maxScore = scores[c]; winner = c; } });
  return { winner: winner, evidence: evidence.slice(0,5) };
}

const noteInput = document.getElementById('noteInput');
const resultBadge = document.getElementById('resultBadge');
const appCard = document.getElementById('appCard');
const evidenceList = document.getElementById('evidenceList');

noteInput.addEventListener('input', () => {
    const analysis = analyzeNoteText(noteInput.value);
    if (analysis.winner !== 'genel' && THEMES[analysis.winner]) {
        const theme = THEMES[analysis.winner];
        appCard.style.borderColor = theme.border;
        resultBadge.style.backgroundColor = theme.bg;
        resultBadge.style.color = theme.accent;
        resultBadge.innerHTML = `<span>${theme.emoji}</span> Kategori: ${theme.label}`;
    } else {
        appCard.style.borderColor = '#334155';
        resultBadge.style.backgroundColor = '#0f172a';
        resultBadge.style.color = '#f8fafc';
        resultBadge.innerHTML = `<span>🤖</span> Ana Kategori: Genel / Belirsiz`;
    }
    evidenceList.innerHTML = analysis.evidence.length > 0 ? analysis.evidence.map(w => `<span class="tag">${w}</span>`).join('') : '-';
});
</script>
</body>
</html>
