<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Not Kategorize Motoru</title>
    <script src="https://mylowe-322.github.io/nlp-motoru/nlp-motoru.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            width: 100%;
            max-width: 600px;
            background: #1e293b;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            transition: all 0.4s ease;
            border: 2px solid #334155;
        }
        h2 {
            margin-top: 0;
            text-align: center;
            color: #38bdf8;
        }
        textarea {
            width: 100%;
            height: 150px;
            background: #0f172a;
            border: 1px solid #475569;
            border-radius: 8px;
            color: #f8fafc;
            padding: 12px;
            font-size: 16px;
            resize: none;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s;
        }
        textarea:focus {
            border-color: #38bdf8;
        }
        .result-box {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            background: #0f172a;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s ease;
        }
        .evidence-box {
            margin-top: 15px;
            font-size: 14px;
            color: #94a3b8;
            background: #0f172a;
            padding: 10px;
            border-radius: 8px;
            min-height: 40px;
        }
        .tag {
            background: #334155;
            color: #e2e8f0;
            padding: 2px 8px;
            border-radius: 4px;
            margin-right: 5px;
            display: inline-block;
            font-size: 12px;
        }
    </style>
</head>
<body>

<div class="container" id="appCard">
    <h2>Not Kategorize Etici</h2>
    <p style="color: #94a3b8; text-align: center; font-size: 14px;">Metni yazdıkça kategori otomatik analiz edilir.</p>
    
    <textarea id="noteInput" placeholder="Kitap notunu veya metnini buraya yazmaya başla... (Örn: Sümer tabletleri veya felsefi bir düşünce)"></textarea>
    
    <div class="result-box" id="resultBadge">
        <span>🤖</span> Ana Kategori: Genel / Bekleniyor
    </div>

    <div class="evidence-box">
        <strong>Yakalanan Kanıt Kelimeler:</strong>
        <div id="evidenceList" style="margin-top: 5px;">-</div>
    </div>
</div>

<script>
    const noteInput = document.getElementById('noteInput');
    const resultBadge = document.getElementById('resultBadge');
    const appCard = document.getElementById('appCard');
    const evidenceList = document.getElementById('evidenceList');

    // Metin alanına her yazı yazıldığında çalışacak tetikleyici
    noteInput.addEventListener('input', () => {
        const text = noteInput.value;
        
        // GitHub'a yüklediğin JS motorundaki analiz fonksiyonunu çağırıyoruz
        const analysis = analyzeNoteText(text);
        
        // Eğer kategori tanımlı bir temaysa arayüzü renklendir
        if (analysis.winner !== 'genel' && typeof THEMES !== 'undefined' && THEMES[analysis.winner]) {
            const theme = THEMES[analysis.winner];
            
            // Kartın kenarlık rengini değiştir
            appCard.style.borderColor = theme.border;
            
            // Sonuç kutusunun rengini ve içeriğini değiştir
            resultBadge.style.backgroundColor = theme.bg;
            resultBadge.style.color = theme.accent;
            resultBadge.innerHTML = `<span>${theme.emoji}</span> Kategori: ${theme.label}`;
        } else {
            // Standart/Genel durum teması
            appCard.style.borderColor = '#334155';
            resultBadge.style.backgroundColor = '#0f172a';
            resultBadge.style.color = '#f8fafc';
            resultBadge.innerHTML = `<span>🤖</span> Ana Kategori: Genel / Belirsiz`;
        }

        // Yakalanan kanıt kelimeleri ekrana bas
        if (analysis.evidence && analysis.evidence.length > 0) {
            evidenceList.innerHTML = analysis.evidence.map(word => `<span class="tag">${word}</span>`).join('');
        } else {
            evidenceList.innerHTML = '<span style="color:#475569">Kanıt bulunamadı...</span>';
        }
    });
</script>

</body>
</html>
